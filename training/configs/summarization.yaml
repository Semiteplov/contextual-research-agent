mode: summarization

base_model: "Qwen/Qwen3-8B"
load_in_4bit: true
max_seq_length: 4096

train_file: "training/data/summarization.jsonl"
val_split: 0.1
seed: 42

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  bias: "none"

training:
  num_train_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.03
  weight_decay: 0.01
  max_grad_norm: 0.3
  optim: "adamw_8bit"
  logging_steps: 10
  save_strategy: "epoch"
  eval_strategy: "epoch"
  save_total_limit: 2
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  greater_is_better: false
  bf16: true
  gradient_checkpointing: true
  group_by_length: false

output_dir: "training/output/summarization"
adapter_save_dir: "training/adapters/summarization"

mlflow:
  enabled: true
  experiment_name: "lora_summarization"
  tracking_uri: ""
